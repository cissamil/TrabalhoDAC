<main>
  <h1 class="titulo">Extrato</h1>
  <p class="subtitulo">Consulte o histórico de transações da sua conta</p>

  <div class="card">
    <h2>Período de Consulta</h2>
    <p>Selecione o período desejado para visualizar o extrato</p>
    <label for="dataInicio">Data Início</label>
    <input [(ngModel)]="dataInicio" type="date">
    <label for="dataFim">Data Fim</label>
    <input [(ngModel)]="dataFim" type="date">
    <button (click)="tirarExtrato()" class="btnNeutro">Consultar Extrato</button>
  </div>
  <p> {{ mensagem }} </p>
</main>
