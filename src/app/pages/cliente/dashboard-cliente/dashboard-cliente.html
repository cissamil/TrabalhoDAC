<main>

    <div class="title">
        <h1>Bem Vindo(a), {{cliente.nome}}!</h1>
        <p class="grey">Confira suas informações financeiras</p>
    </div>
    
    <div class="dashboard-container">

        <div class="info-cards">
    
            @for(infoCard of infoCards; track $index){
    
                <div class="info-card">
                    <div class="top">
                        <p>{{infoCard.topTitle}}</p>
                        <mat-icon fontIcon="{{infoCard.icon}}" style="font-size: 1rem;"></mat-icon>
                    </div>
                    <div class="middle">
        
                        <p class="{{infoCard.color}}">R$ {{infoCard.middleContent | number:'1.2-2'}}</p>
                    </div>
                    <div class="bottom">
                        <p>{{infoCard.bottomText}}</p>
                    </div>
                </div>
            }
    
        </div>
    
        <div class="personal-manager">
            <div class="manager-header">
                <mat-icon fontIcon="person"></mat-icon>
                <p>Seu Gerente</p>
            </div>
            <div class="manager-info">
                <p>{{nomeGerente}}</p>
            </div>
            <div class="manager-contact">
                Entre em contato para mais informações sobre sua conta
            </div>
        </div>
        
    </div>

    

</main>
