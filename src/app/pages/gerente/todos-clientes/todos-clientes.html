<section>
  <div class="title">
    <h2>Todos os Clientes</h2>
    <p>Visualize os clientes cadastrados.</p>
  </div>

  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Nome</th>
          <th>E-mail</th>
          <th>Saldo</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody>
        @for (cliente of clientes; track cliente.id) {
          <tr>
            <td>{{ cliente.id }}</td>
            <td>{{ cliente.nome }}</td>
            <td>{{ cliente.email }}</td>
            <td>R$ {{ cliente.saldo.toFixed(2) }}</td>
            <td>
              <span class="status" [class.inativo]="cliente.status === 'Inativo'">
                {{ cliente.status }}
              </span>
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</section>
