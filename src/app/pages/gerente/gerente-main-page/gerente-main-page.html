<main>
	<header>
		<div class="title">
			<h1>BANTADS</h1>
			<p>Área do Gerente</p>
		</div>
		<div class="icon" (click)="logOut()">
			<a href="">Sair</a>
		</div>
	</header>

	<div class="container">
		<div class="navigation-card">
			<a routerLink="dashboard" routerLinkActive="active-link">
				<mat-icon aria-hidden="false" aria-label="Dashboard" fontIcon="dashboard"></mat-icon>
				Home
			</a>

			<a routerLink="todos-clientes" routerLinkActive="active-link">
				<mat-icon aria-hidden="false" aria-label="Todos os clientes" fontIcon="groups"></mat-icon>
				Todos os Clientes
			</a>

			<a routerLink="consultar-cliente" routerLinkActive="active-link">
				<mat-icon aria-hidden="false" aria-label="Consultar cliente" fontIcon="person_search"></mat-icon>
				Consultar Cliente
			</a>

			<a routerLink="top-3-clientes" routerLinkActive="active-link">
				<mat-icon aria-hidden="false" aria-label="Top 3 clientes" fontIcon="leaderboard"></mat-icon>
				Top 3 Clientes
			</a>
		</div>

		<div class="components">
			<router-outlet></router-outlet>
		</div>
	</div>
</main>
