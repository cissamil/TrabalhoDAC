<section>
  <div class="title">
    <h2>Top 3 Melhores Clientes</h2>
    <p>Ranking dos clientes com maior saldo em conta.</p>
  </div>

  <div class="ranking-grid">
    @for (cliente of topClientes; track cliente.posicao) {
      <article class="ranking-card">
        <span class="position">#{{ cliente.posicao }}</span>
        <h3>{{ cliente.nome }}</h3>
        <p>CPF: <strong>{{ cliente.cpf }}</strong></p>
        <p>Saldo: <strong>{{ formatarMoeda(cliente.saldo) }}</strong></p>
        <p>Limite: <strong>{{ formatarMoeda(cliente.limite) }}</strong></p>
      </article>
    }
  </div>
</section>
