<section>
  <div class="title">
    <h2>Top 3 Melhores Clientes</h2>
    <p>Ranking dos clientes com melhor desempenho.</p>
  </div>

  <div class="ranking-grid">
    @for (cliente of topClientes; track cliente.posicao) {
      <article class="ranking-card">
        <span class="position">#{{ cliente.posicao }}</span>
        <h3>{{ cliente.nome }}</h3>
        <p>Volume: <strong>R$ {{ cliente.volumeFinanceiro.toFixed(2) }}</strong></p>
        <p>Score: <strong>{{ cliente.score }}</strong></p>
      </article>
    }
  </div>
</section>
