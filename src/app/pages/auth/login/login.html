<main>
    <div class="container">
        <div class="header-container">
            <img class="img-logo" src="bank_icon.webp" alt="">

            <h1>BANTADS</h1>
        </div>
        <div class="form-control">
            <form action="">
                
                <label for="profile">Perfil de acesso</label>
                <select name="profile" id="">
                    <option value="cliente" (click)="setAcessProfile(profileOptions.Cliente)">Cliente</option>
                    <option value="gerente" (click)="setAcessProfile(profileOptions.Gerente)">Gerente</option>
                    <option value="administrador" (click)="setAcessProfile(profileOptions.Admin)">Administrador</option>
                </select>

                <label for="email">E-mail</label>
                <input type="email" [(ngModel)]="email" name="email"  id="" placeholder="usuario@email.com">

                <label for="password">Senha</label>
                <input type="password" [(ngModel)]="senha" name="senha" id="" placeholder="******">
                
                <button class="entrar" type="submit" (click)="loginUser()">Entrar</button>
                <a  class="criar-conta" (click)="redirect('/registro')">Criar conta</a>
            </form>
        </div>
    </div>
</main>
