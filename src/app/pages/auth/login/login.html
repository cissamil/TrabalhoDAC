<main>
    <div class="container">
        <div class="header-container">
            <img class="img-logo" src="bank_icon.webp" alt="">

            <h1>BANTADS</h1>
        </div>
        <div class="form-control">
            <form action="">
                
                <label for="profile">Perfil de acesso</label>
                <select name="profile" id="">
                    <option value="cliente">Cliente</option>
                    <option value="gerente">Gerente</option>
                    <option value="administrador">Administrador</option>
                </select>

                <label for="email">E-mail</label>
                <input type="email" name="email" id="" placeholder="usuario@email.com">

                <label for="password">Senha</label>
                <input type="password" name="password" id="" placeholder="******">
                
                <button class="entrar" type="submit" (click)="redirectToClienteDashboardPage()">Entrar</button>
                <a  class="criar-conta" (click)="redirectToRegisterPage()">Criar conta</a>
            </form>
        </div>
    </div>
</main>
