<main>
    <div class="container">
        <div class="header-container">

            <img class="img-logo" src="bank_icon.webp" alt="">

            <div class="header-content">

                <h1>BANTADS</h1>

                <div class="diviser"></div>
                <p>*Página de registro dedicada aos clientes</p>

            </div>

        </div>
        <div class="form-control">
            <form (ngSubmit)="registrarUsuario()">

                <div class="field full-length">
                    <label for="name">Nome Completo</label>
                    <input type="text" [(ngModel)]="cliente.nome" name="nome" placeholder="Digite o seu nome completo">
                </div>

                <div class="field full-length">
                    <label>E-mail</label>
                    <input type="email" [(ngModel)]="cliente.email" name="email" placeholder="seu@email.com">
                </div>

                <div class="field">
                    <label>CPF</label>
                    <input type="text" [(ngModel)]="cliente.cpf" name="cpf" mask="000.000.000-00"
                        placeholder="123.456.789-10">
                </div>

                <div class="field">
                    <label>Telefone</label>
                    <input type="text" [(ngModel)]="cliente.telefone" name="telefone" mask="(00) 00000-0000"
                        placeholder="(12) 12345-6789">
                </div>

                <div class="field">
                    <label>Salário Mensal (R$)</label>
                    <input type="text" [(ngModel)]="salario" (input)="handleSalario($event)" name="salario">
                </div>

                <div class="field">
                    <label>CEP</label>
                    <input type="text" [(ngModel)]="cliente.endereco.cep" name="cep" placeholder="00000-000"
                        mask="00000-000">
                </div>

                <div class="field full-length">
                    <label>Endereço</label>
                    <input type="text" [(ngModel)]="cliente.endereco.logradouro" name="logradouro"
                        placeholder="Rua das Flores">
                </div>

                <div class="field">
                    <label>Número</label>
                    <input type="text" [(ngModel)]="cliente.endereco.numero" name="numero" placeholder="598">
                </div>

                <div class="field">
                    <label>Cidade</label>
                    <input type="text" [(ngModel)]="cliente.endereco.cidade" name="cidade" placeholder="Sua cidade">
                </div>

                <div class="field">
                    <label>Estado</label>
                    <select type="text" [(ngModel)]="cliente.endereco.estado" name="estado" placeholder="UF">
                        @for (estado of uf; track $index) {
                        <option value="{{estado}}">{{estado}}</option>
                        }
                    </select>
                </div>
                
                <button class="enviar full-length" type="submit" [disabled]="isLoading">
                    @if(isLoading) {
                        <mat-spinner diameter="24" style="margin: 0 auto;"></mat-spinner>
                    } @else {
                        Enviar Solicitação
                    }
                </button>

            </form>
            <p>Já possui conta? <span class="login" (click)="redirectToLoginPage()">Faça o login</span></p>
        </div>
    </div>


    @if(responseModal) {
        <div class="modal-overlay">
            <div class="modal-card">
                <div class="modal-icon-container" [class]="responseModal.type">
                    <mat-icon>{{ responseModal.messageIcon }}</mat-icon>
                </div>

                <div class="modal-content">
                    <h3>{{ responseModal.title || 'Aviso' }}</h3>
                    <p>{{ responseModal.message }}</p>
                </div>

                <button class="modal-button" (click)="closeModal()">Entendido</button>
            </div>
        </div>
    }
</main>
