server:
  port: 8083

spring:
  docker:
    compose:
      enabled: false

  application:
      name: "MsConta"

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    defer-datasource-initialization: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc.batch_size: 50
        order_inserts: true
        order_updates: true
  datasource:
      command:
        url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ms_conta_cud_db}
        username: tads
        password: tads
        driver-class-name: org.postgresql.Driver

      query:
        url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ms_conta_r_db}
        username: tads
        password: tads
        driver-class-name: org.postgresql.Driver

  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: 5672
    username: tads
    password: tads

  sql:
    init:
      mode: never


springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /
    disable-swagger-default-url: true
